name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

      - name: Pack
        run: npm run pack

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: artifacts/*.tgz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tgz
          generate_release_notes: true
